name: Build and Deploy

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]

env:
  QT_VERSION: "6.9.0"

jobs:

  # ── macOS ──────────────────────────────────────────────────────────────────
  build-macos:
    name: macOS
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install qt openldap openssl

      - name: Generate ICNS icon
        run: |
          PNG=editor/images/LdapEditorApp.png
          ICONSET=build/LdapEditorApp.iconset
          mkdir -p "$ICONSET"
          for sz in 16 32 64 128 256 512; do
            sips -z $sz $sz "$PNG" --out "$ICONSET/icon_${sz}x${sz}.png"
          done
          sips -z 32  32  "$PNG" --out "$ICONSET/icon_16x16@2x.png"
          sips -z 64  64  "$PNG" --out "$ICONSET/icon_32x32@2x.png"
          sips -z 256 256 "$PNG" --out "$ICONSET/icon_128x128@2x.png"
          sips -z 512 512 "$PNG" --out "$ICONSET/icon_256x256@2x.png"
          iconutil -c icns "$ICONSET" -o build/LdapEditorApp.icns

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$(brew --prefix qt)"

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Create DMG
        run: |
          APP=build/editor/LdapEditorApp.app
          MACDEPLOYQT="$(brew --prefix qt)/bin/macdeployqt"
          "$MACDEPLOYQT" "$APP" -dmg -always-overwrite
          mv build/editor/LdapEditorApp.dmg "LdapEditorApp-macos.dmg"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LdapEditorApp-macos
          path: LdapEditorApp-macos.dmg

      - name: Publish release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: LdapEditorApp-macos.dmg

  # ── Linux ──────────────────────────────────────────────────────────────────
  build-linux:
    name: Linux
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libldap-dev libssl-dev libsasl2-dev \
            libgl1-mesa-dev libglu1-mesa-dev \
            libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-render-util0 libxcb-xinerama0 libxkbcommon-x11-0 \
            libfuse2 patchelf

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          modules: qt5compat
          cache: true

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Install into staging directory
        run: cmake --install build --prefix appdir/usr

      - name: Download linuxdeploy
        run: |
          curl -fsSL -o linuxdeploy \
            https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          curl -fsSL -o linuxdeploy-plugin-qt \
            https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy linuxdeploy-plugin-qt

      - name: Build AppImage
        env:
          QMAKE: ${{ env.Qt6_DIR }}/bin/qmake
          OUTPUT: LdapEditorApp-linux-x86_64.AppImage
        run: |
          cp editor/install/LdapEditorApp.png appdir/usr/share/icons/hicolor/32x32/apps/
          ./linuxdeploy \
            --appdir appdir \
            --plugin qt \
            --desktop-file editor/install/LdapEditorApp.desktop \
            --icon-file editor/install/LdapEditorApp.png \
            --output appimage

      - name: Rename AppImage
        run: mv LdapEditorApp*.AppImage LdapEditorApp-linux-x86_64.AppImage

      - name: Build DEB package
        run: |
          cmake --build build --target package
          cp build/*.deb . 2>/dev/null || true

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: LdapEditorApp-linux-AppImage
          path: LdapEditorApp-linux-x86_64.AppImage

      - name: Upload DEB artifact
        uses: actions/upload-artifact@v4
        with:
          name: LdapEditorApp-linux-deb
          path: "*.deb"
        continue-on-error: true

      - name: Publish release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            LdapEditorApp-linux-x86_64.AppImage
            *.deb

  # ── Windows ────────────────────────────────────────────────────────────────
  build-windows:
    name: Windows
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          arch: win64_msvc2022_64
          modules: qt5compat
          cache: true

      - name: Set up MSVC
        uses: microsoft/setup-msbuild@v2

      - name: Install OpenLDAP and OpenSSL via vcpkg
        run: vcpkg install openldap:x64-windows openssl:x64-windows

      - name: Generate ICO icon
        shell: pwsh
        run: |
          # Use .NET to convert PNG to ICO
          Add-Type -AssemblyName System.Drawing
          $png  = [System.Drawing.Image]::FromFile("$PWD\editor\images\LdapEditorApp.png")
          $ico  = "$PWD\editor\install\LdapEditorApp.ico"
          $ms   = New-Object System.IO.MemoryStream
          foreach ($sz in @(16, 32, 48, 64, 128, 256)) {
              $bmp = New-Object System.Drawing.Bitmap($png, $sz, $sz)
              $bmp.Save($ms, [System.Drawing.Imaging.ImageFormat]::Png)
          }
          # Simple ICO writer (single 32x32 frame)
          $bmp32 = New-Object System.Drawing.Bitmap($png, 32, 32)
          $tmpPng = [System.IO.Path]::GetTempFileName() + ".png"
          $bmp32.Save($tmpPng)
          # Use magick if available, otherwise copy PNG as placeholder
          if (Get-Command magick -ErrorAction SilentlyContinue) {
              magick convert $tmpPng -define icon:auto-resize="256,128,64,48,32,16" $ico
          } else {
              Copy-Item $tmpPng $ico
          }

      - name: Configure
        shell: pwsh
        run: |
          cmake -B build `
            -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Deploy Qt DLLs
        shell: pwsh
        run: |
          $exe = "build\editor\Release\LdapEditorApp.exe"
          & "$env:Qt6_DIR\bin\windeployqt.exe" --release --no-compiler-runtime $exe

      - name: Package with CPack (NSIS)
        shell: pwsh
        run: |
          cd build
          cpack -C Release -G NSIS
        continue-on-error: true

      - name: Create ZIP archive
        shell: pwsh
        run: |
          $dir = "build\editor\Release"
          Compress-Archive -Path "$dir\*" -DestinationPath "LdapEditorApp-windows-x64.zip"

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: LdapEditorApp-windows-zip
          path: LdapEditorApp-windows-x64.zip

      - name: Upload NSIS installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: LdapEditorApp-windows-installer
          path: build/*.exe
        continue-on-error: true

      - name: Publish release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            LdapEditorApp-windows-x64.zip
            build/*.exe
